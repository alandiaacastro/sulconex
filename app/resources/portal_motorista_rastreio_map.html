<!--[main]-->
<div id="{$map_id}" style="width:100%;height:420px;border:1px solid #d9dee5;border-radius:14px;overflow:hidden;background:#f8fafc;"></div>
<div style="margin-top:10px;font-size:13px;color:#475569;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
    <span><b>Mapa de rastreio:</b> {$summary_text}</span>
    <span style="display:flex;align-items:center;gap:10px;">
        <span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:#16a34a;display:inline-block;"></span> Atualizado 24h</span>
        <span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:#f97316;display:inline-block;"></span> Sem atualizacao 24h</span>
    </span>
</div>

<script>
(function () {
    var mapId = '{$map_id}';
    var mapNode = document.getElementById(mapId);
    if (!mapNode) {
        return;
    }

    var markers = [];
    try {
        markers = JSON.parse(atob('{$markers_b64}')) || [];
    } catch (error) {
        markers = [];
    }

    function loadLeafletCss() {
        if (document.getElementById('leaflet-css-cdn')) {
            return;
        }
        var link = document.createElement('link');
        link.id = 'leaflet-css-cdn';
        link.rel = 'stylesheet';
        link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
        document.head.appendChild(link);
    }

    function renderEmptyState() {
        mapNode.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:14px;padding:24px;text-align:center;">Nenhuma posicao encontrada para os filtros atuais.</div>';
    }

    function ensureLeaflet(onReady, onFail) {
        if (typeof L !== 'undefined') {
            onReady();
            return;
        }

        loadLeafletCss();

        var existing = document.getElementById('leaflet-js-cdn');
        if (existing) {
            var startedAt = Date.now();
            var wait = setInterval(function () {
                if (typeof L !== 'undefined') {
                    clearInterval(wait);
                    onReady();
                    return;
                }
                if (Date.now() - startedAt > 6000) {
                    clearInterval(wait);
                    onFail();
                }
            }, 150);
            return;
        }

        var script = document.createElement('script');
        script.id = 'leaflet-js-cdn';
        script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
        script.async = true;
        script.onload = function () {
            if (typeof L !== 'undefined') {
                onReady();
            } else {
                onFail();
            }
        };
        script.onerror = onFail;
        document.head.appendChild(script);

        setTimeout(function () {
            if (typeof L === 'undefined') {
                onFail();
            }
        }, 7000);
    }

    function drawMap() {
        if (!Array.isArray(markers) || markers.length === 0) {
            renderEmptyState();
            return;
        }

        var first = markers[0];
        var map = L.map(mapId, {
            zoomControl: true,
            scrollWheelZoom: false
        }).setView([Number(first.lat), Number(first.lon)], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 18
        }).addTo(map);

        var bounds = [];

        markers.forEach(function (marker) {
            var lat = Number(marker.lat);
            var lon = Number(marker.lon);
            if (isNaN(lat) || isNaN(lon)) {
                return;
            }

            bounds.push([lat, lon]);

            var icon = L.divIcon({
                html: '<div style="width:18px;height:18px;border-radius:50%;background:' + (marker.is_recent ? '#16a34a' : '#f97316') + ';border:3px solid #fff;box-shadow:0 2px 10px rgba(15,23,42,.25);"></div>',
                className: '',
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });

            var popupHtml = '<div style="font-weight:700;color:#0f172a;margin-bottom:4px">' + (marker.title || 'Motorista') + '</div>' +
                '<div style="font-size:12px;color:#475569;margin-bottom:8px">' + (marker.subtitle || '') + '</div>' +
                (marker.popup_html || '');

            L.marker([lat, lon], { icon: icon }).addTo(map).bindPopup(popupHtml);
        });

        if (bounds.length === 1) {
            map.setView(bounds[0], 12);
        } else if (bounds.length > 1) {
            map.fitBounds(bounds, { padding: [24, 24] });
        }

        setTimeout(function () {
            map.invalidateSize();
        }, 200);
    }

    ensureLeaflet(drawMap, renderEmptyState);
})();
</script>
<!--[/main]-->
